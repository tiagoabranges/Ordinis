version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: ordinis-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ordinis
      POSTGRES_PASSWORD: ordinis
      POSTGRES_DB: ordinis
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: